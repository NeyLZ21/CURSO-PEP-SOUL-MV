<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inducción Soul MV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
button{background:#781C38;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
button:disabled{opacity:.5}
input,select{width:100%;padding:10px;margin:5px 0 10px;border-radius:5px;border:1px solid #ccc}

.cert-card{border:2px solid #781C38;padding:30px;text-align:center;border-radius:10px}
.cert-title{font-size:22px;font-weight:bold}
.cert-name{font-size:20px;margin:10px 0}
.show{display:block}
#certificado{display:none}
.error{color:red}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Mi perfil</h2>

<input id="pf-name" placeholder="Nombre completo">
<input id="pf-id" placeholder="Cédula o Pasaporte">
<select id="pf-spec">
<option value="">Seleccione módulo</option>
<option>CLÍNICO</option>
<option>CLÍNICO/QUIRÚRGICO</option>
<option>SOLO UCI</option>
<option>SOLO EMERGENCIAS</option>
<option>SOLO CONSULTA EXTERNA</option>
</select>

<button id="btn-save-profile">Guardar perfil</button>
<div id="pf-msg"></div>
</div>

<div class="card">
<h2>Curso</h2>
<iframe id="video" width="100%" height="315" src="" allowfullscreen></iframe>
<br><br>
<button onclick="nextVideo()">Siguiente</button>
</div>

<section id="certificado">
<div class="cert-card">
<div class="cert-title">Certificado</div>
<p>Otorgado a</p>
<div class="cert-name" id="cert-nombre"></div>
<div id="cert-email"></div>
<p>Por completar el curso</p>
<div id="cert-fecha"></div>
</div>
</section>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let state = JSON.parse(localStorage.getItem("state") || "{}");
let currentVideo = 0;

const videos = [
  "eY52Zsg-KVI", // VIDEO CORREGIDO
  "fJ9rUzIMcZQ",
  "L_jWHffIx5E"
];

function persist(){
  localStorage.setItem("state",JSON.stringify(state));
}

function loadVideo(){
  document.getElementById("video").src =
    "https://www.youtube.com/embed/"+videos[currentVideo];
}

function nextVideo(){
  currentVideo++;
  if(currentVideo >= videos.length){
    showCertificate();
  }else{
    loadVideo();
  }
}

function showCertificate(){
  const user = auth.currentUser;
  document.getElementById("cert-nombre").textContent =
    state.profile?.name || "Usuario";

  document.getElementById("cert-email").textContent =
    user?.email ? "Correo: "+user.email : "";

  document.getElementById("cert-fecha").textContent =
    new Date().toLocaleDateString();

  document.getElementById("certificado").classList.add("show");
}

async function saveProfile(){
  const name = document.getElementById("pf-name").value.trim();
  const id = document.getElementById("pf-id").value.trim();
  const spec = document.getElementById("pf-spec").value;
  const msg = document.getElementById("pf-msg");

  if(!name || !id || !spec){
    msg.innerHTML = "<span class='error'>Completa todos los campos</span>";
    return;
  }

  state.profile = {name,id,spec};
  persist();

  msg.textContent="Guardando...";

  try{
    const uid = auth.currentUser?.uid;
    if(!uid) throw "No auth";

    await db.collection("users").doc(uid).set({
      ...state.profile,
      email: auth.currentUser.email
    },{merge:true});

    msg.textContent="✅ Guardado correctamente";

  }catch(e){
    msg.textContent="⚠ Guardado local (sin conexión)";
  }
}

document.getElementById("btn-save-profile")
  .addEventListener("click",saveProfile);

auth.signInAnonymously().then(()=>{
  loadVideo();
});
</script>

</body>
</html>
