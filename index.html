<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inducción a PEP - SOUL MV</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:15px}
.btn{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.btn-primary{background:#781C38;color:white}
.btn-muted{background:#ddd}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="card">
<h2>Inducción a PEP - SOUL MV</h2>
<div>Curso para Médicos y estudiantes en formación • By Dr. Ney Loor</div>
</div>

<!-- ACCESO -->
<div class="card">
<h3>Acceso</h3>

<input id="email" placeholder="Correo"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>

<button class="btn btn-primary" onclick="login()">Confirmar</button>

</div>

<!-- PERFIL -->
<div class="card" id="profileBox" style="display:none">

<h3>Mi perfil</h3>

<input id="pf-name" placeholder="Nombre"><br><br>

<select id="pf-spec">
<option value="">Selecciona</option>
<option>SOLO UCI</option>
<option>CLÍNICO</option>
</select>

<div style="margin-top:10px">

<button id="btn-edit-profile" class="btn btn-muted">Modificar</button>
<button id="btn-cancel-profile" class="btn btn-muted" style="display:none">Cancelar</button>
<button id="btn-save-profile" class="btn btn-primary" disabled>Guardar perfil</button>

</div>

</div>

<!-- FOOTER -->
<div class="card">
© 2026 Hospital Vozandes — Inducción a PEP - SOUL MV - Desarrollado por Dr. Ney Loor
</div>

</div>

<script>

let state={
  profile:{
    name:"",
    spec:""
  }
};

let originalProfile=null;

// ===== LOGIN SIMULADO =====
function login(){
  document.getElementById("profileBox").style.display="block";
}

// ===== HABILITAR EDICIÓN =====
document.getElementById("btn-edit-profile").onclick=()=>{
  originalProfile={...state.profile};

  document.getElementById("pf-name").disabled=false;
  document.getElementById("pf-spec").disabled=false;

  document.getElementById("btn-save-profile").disabled=false;

  document.getElementById("btn-cancel-profile").style.display="inline-block";
};

// ===== CANCELAR =====
document.getElementById("btn-cancel-profile").onclick=()=>{
  if(originalProfile){
    state.profile={...originalProfile};

    document.getElementById("pf-name").value=state.profile.name;
    document.getElementById("pf-spec").value=state.profile.spec;
  }

  document.getElementById("btn-save-profile").disabled=true;
  document.getElementById("btn-cancel-profile").style.display="none";
};

// ===== GUARDAR =====
document.getElementById("btn-save-profile").onclick=()=>{
  state.profile.name=document.getElementById("pf-name").value;
  state.profile.spec=document.getElementById("pf-spec").value;

  document.getElementById("btn-save-profile").disabled=true;
  document.getElementById("btn-cancel-profile").style.display="none";

  alert("Perfil guardado");
};

</script>

</body>
</html>
